---
- name: Install Podman
  ansible.builtin.package:
    name: podman
    state: present

- name: Install depedencies for Docker official repository (Debian)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Create keyring directory (Debian)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == 'Debian'

- name: Add GPG key Docker official repository (Debian)
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts['os_family'] == 'Debian'

- name: Add official repository for Docker (Debian)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }}
      stable
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Docker (Debian)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - docker-buildx-plugin
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Docker (RedHat)
  ansible.builtin.dnf:
    name:
      - moby-engine
      - docker-compose
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Start and enable Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
